{% extends 'base.html' %}

{% block title %}
Create User
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body p-4">

                <h3>Create User</h3>

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit"
                            class="btn btn-primary">
                        Create Account
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
