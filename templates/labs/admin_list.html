{% extends 'base.html' %}
{% block title %}Lab Bookings - Admin{% endblock %}
{% block content %}
<h1>Lab Bookings</h1>
<form method="get" class="mb-3"><select name="status" class="form-select w-auto d-inline"><option value="">All</option>{% for v,l in statuses %}<option value="{{ v }}" {% if status_filter == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select> <button class="btn btn-primary">Filter</button></form>
<table class="table table-hover bg-white shadow-sm"><thead><tr><th>Startup</th><th>Lab</th><th>Date</th><th>Status</th><th></th></tr></thead>
<tbody>{% for b in bookings %}<tr><td>{{ b.startup.brand_name }}</td><td>{{ b.lab.lab_name }}</td><td>{{ b.requested_date }}</td><td>{{ b.status }}</td><td><a href="{% url 'labs:admin_detail' b.pk %}">Review</a></td></tr>{% endfor %}</tbody></table>
{% endblock %}
