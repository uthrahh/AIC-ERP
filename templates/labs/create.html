{% extends 'base.html' %}
{% block title %}Schedule Lab{% endblock %}
{% block content %}
<h1>Schedule Lab</h1>
<form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label">Lab</label>{{ form.lab }}</div>
    <div class="mb-3"><label class="form-label">Date</label>{{ form.requested_date }}</div>
    <div class="row mb-3"><div class="col"><label class="form-label">Start</label>{{ form.start_time }}</div><div class="col"><label class="form-label">End</label>{{ form.end_time }}</div></div>
    <div class="mb-3"><label class="form-label">Equipment Required</label>{{ form.equipment }}</div>
    <button class="btn btn-primary">Submit Booking</button>
</form>
{% endblock %}
