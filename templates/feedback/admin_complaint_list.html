{% extends 'base.html' %}
{% block title %}Complaints - Admin{% endblock %}
{% block content %}
<h1>Complaints</h1>
<table class="table bg-white shadow-sm"><thead><tr><th>Startup</th><th>Subject</th><th>Status</th><th></th></tr></thead>
<tbody>{% for c in complaints %}<tr><td>{{ c.startup.brand_name }}</td><td>{{ c.subject }}</td><td>{{ c.status }}</td><td><a href="{% url 'feedback:admin_complaint_detail' c.pk %}">View</a></td></tr>{% endfor %}</tbody></table>
{% endblock %}
