{% extends 'base.html' %}
{% block title %}Complaints{% endblock %}
{% block content %}
<h1>My Complaints <a href="{% url 'feedback:complaint_create' %}" class="btn btn-warning btn-sm">+ New</a></h1>
<table class="table bg-white shadow-sm"><thead><tr><th>Subject</th><th>Status</th><th>Date</th></tr></thead>
<tbody>{% for c in complaints %}<tr><td>{{ c.subject }}</td><td>{{ c.status }}</td><td>{{ c.created_at|date:"M d, Y" }}</td></tr>{% empty %}<tr><td colspan="3" class="text-muted">None</td></tr>{% endfor %}</tbody></table>
{% endblock %}
